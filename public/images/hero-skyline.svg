      <line x1="830" y1="690" x2="830" y2="756"/>
      <line x1="980" y1="700" x2="980" y2="756"/>
      <line x1="1080" y1="668" x2="1080" y2="756"/>
      <line x1="1180" y1="658" x2="1180" y2="756"/>
      <line x1="1280" y1="672" x2="1280" y2="756"/>
