    <rect x="240" y="595" width="6" height="8"/><rect x="255" y="620" width="6" height="8"/><rect x="240" y="645" width="6" height="8"/>
    <rect x="420" y="650" width="6" height="8"/><rect x="435" y="670" width="6" height="8"/>
    <rect x="530" y="545" width="6" height="8"/><rect x="545" y="575" width="6" height="8"/><rect x="530" y="605" width="6" height="8"/><rect x="545" y="635" width="6" height="8"/>
    <rect x="700" y="625" width="6" height="8"/><rect x="715" y="650" width="6" height="8"/>
    <rect x="835" y="585" width="6" height="8"/><rect x="850" y="615" width="6" height="8"/><rect x="835" y="645" width="6" height="8"/>
    <rect x="1010" y="640" width="6" height="8"/><rect x="1025" y="660" width="6" height="8"/>
    <rect x="1160" y="540" width="6" height="8"/><rect x="1175" y="570" width="6" height="8"/><rect x="1160" y="600" width="6" height="8"/><rect x="1175" y="630" width="6" height="8"/>
