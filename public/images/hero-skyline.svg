    <circle cx="980" cy="70" r="1"/><circle cx="1240" cy="130" r="1.2"/><circle cx="1480" cy="90" r="1"/>
    <circle cx="300" cy="210" r="0.9"/><circle cx="870" cy="230" r="1"/><circle cx="1370" cy="220" r="0.9"/>
    <circle cx="560" cy="300" r="0.8"/><circle cx="1100" cy="280" r="1.1"/>
  </g>

  <!-- Distant skyline silhouette -->
