<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="0.55" stop-color="#141216"/>
      <stop offset="0.78" stop-color="#241d14"/>
      <stop offset="1" stop-color="#3a2c15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="1" r="0.75">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2318"/>
      <stop offset="1" stop-color="#0d0c0a"/>
